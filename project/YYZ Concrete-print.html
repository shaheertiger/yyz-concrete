<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YYZ Concrete — Print</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Black&family=IBM+Plex+Mono:wght@400;500;600&display=swap" />

<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

  .print-cover {
    width: 100%;
    background: #0a0a0a;
    color: #f0eee9;
    padding: 80px 64px;
    box-sizing: border-box;
    font-family: "Barlow Condensed", "Arial Narrow", sans-serif;
  }
  .print-cover h1 { font-size: 120px; font-weight: 800; letter-spacing: -0.03em; line-height: 0.9; margin: 0 0 24px; text-transform: uppercase; }
  .print-cover .accent { color: #FF6A00; }
  .print-cover .meta { font-family: "JetBrains Mono", monospace; font-size: 13px; letter-spacing: 0.15em; color: rgba(240,238,233,0.6); text-transform: uppercase; margin-bottom: 60px; }
  .print-cover .toc { font-family: "Barlow", sans-serif; font-size: 18px; line-height: 1.8; }

  .page-break { break-before: page; page-break-before: always; }

  .variation-label {
    background: #FF6A00; color: #0a0a0a; padding: 24px 64px;
    font-family: "Barlow Condensed", sans-serif; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.05em; font-size: 28px;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .variation-label .meta { font-family: "JetBrains Mono", monospace; font-size: 12px; letter-spacing: 0.15em; }

  .variation-frame { width: 1440px; max-width: 100%; margin: 0 auto; }

  @page { size: 1440px 2000px; margin: 0; }

  @media print {
    html, body { background: #f0eee9; }
    .variation-frame { width: 1440px; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="site-shared.jsx"></script>
<script type="text/babel" src="variation-a.jsx"></script>
<script type="text/babel" src="variation-b.jsx"></script>

<script type="text/babel">
function Print() {
  const accent = "#FF6A00";
  return (
    <>
      <section className="print-cover">
        <div className="meta">YYZ Concrete · Homepage Directions · April 2026</div>
        <h1>Two<br/>Ways<br/>To <span className="accent">Pour.</span></h1>
        <div className="toc">
          <div>A · Rugged Industrial — condensed display, photo hero, dispatch log</div>
          <div>B · Editorial Type — type-led grid, marquee, monolithic mark</div>
        </div>
      </section>

      <div className="page-break" />
      <div className="variation-label">
        <span>Variation A — Rugged Industrial</span>
        <span className="meta">01 / 02</span>
      </div>
      <div className="variation-frame">
        <VariationA accent={accent} />
      </div>

      <div className="page-break" />
      <div className="variation-label">
        <span>Variation B — Editorial Type</span>
        <span className="meta">02 / 02</span>
      </div>
      <div className="variation-frame">
        <VariationB accent={accent} />
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Print />);

// Auto-print after fonts + JSX + images are ready.
(async () => {
  try { await document.fonts.ready; } catch (e) {}
  // wait for any remaining images to decode
  const imgs = Array.from(document.querySelectorAll('img'));
  await Promise.all(imgs.map(img => img.complete ? null : new Promise(r => { img.onload = img.onerror = r; })));
  setTimeout(() => window.print(), 500);
})();
</script>
</body>
</html>
